---
- name: Deploy Maven Artifact (Jenkins User Accessible)
  hosts: local
  become: no

  tasks:
    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: /home/thejan/deployment
        state: directory
        mode: '0755'

    - name: Copy the artifact to the deployment directory
      ansible.builtin.copy:
        src: /mnt/c/Users/thejan/.jenkins/workspace/HelloMaven-CI-A2/target/*.jar
        dest: /home/thejan/deployment/HelloMaven.jar
        remote_src: yes
